<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-pUA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <!-- Fontawesome CDN Link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
    <title>Review System</title>
    <link rel="https:// cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body style="background-color: gray;">
    <h1 style="text-align: center;">Add a Review</h1>
    <label>
        <h3>Company Name:</h3>
    </label>
    <input type="text" name="Company name"><br><br>
    <label>
        <h3> Pros:</h3>
    </label>
    <textarea name="usermessage" rows="5" cols="60"></textarea><br><br>
    <label>
        <h3> Cons:</h3>
    </label>
    <textarea name="usermessage" rows="5" cols="60"></textarea><br><br><br>
    <label>
        <h3>Rating:</h3>
    </label>
    <div class="rating-box">
        <div class="stars">
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star"></i>
            <i class="fa-solid fa-star"></i>
        </div>
    </div><br><br>
    <button type="submit" class="btn">Submit Review</button>
</body>
<script src="app.js"></script>

</html>
